services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - parklog_mongo:/data/db

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --ignore-scripts && npm run dev"
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/parklog
      CORS_ORIGIN: "*"
      DEFAULT_LOT_ID: adtu-main
      STALE_AFTER_SECONDS: 45
      REQUIRE_DEVICE_API_KEY: "false"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

volumes:
  parklog_mongo:
  backend_node_modules:
